name: Android Build (PowerVR Optimized)

on:
  push:
    branches: [ main ] # تفعيل البناء عند الرفع لفرع main

jobs:
  build:
    runs-on: ubuntu-latest # البناء على خوادم لودنوكس القوية

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android NDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          ndk-version: '25.2.9519653' # نسخة NDK ضرورية لـ PowerVR

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: xemu-powervr-edition
        path: app/build/outputs/apk/release/*.apk
